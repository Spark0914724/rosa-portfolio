[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[scheduled]]
  # Runs every 5 days at 00:00 UTC
  cron = "0 0 */5 * *"
  command = "supabase-keep-alive"
